version: "3.8"

services:
  spark-master:
    image: apache/spark:3.5.0
    container_name: temp-spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./:/opt/workspace
      - ./Pipeline/data/raw_data:/opt/dataset

  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: temp-spark-worker-1
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=3
      - SPARK_WORKER_MEMORY=4G
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./:/opt/workspace
      - ./Pipeline/data/raw_data:/opt/dataset
    mem_limit: 4g
    cpus: 3

  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: temp-spark-worker-2
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=3
      - SPARK_WORKER_MEMORY=4G
    depends_on:
      - spark-master
    ports:
      - "8082:8081"
    volumes:
      - ./:/opt/workspace
      - ./Pipeline/data/raw_data:/opt/dataset
    mem_limit: 4g
    cpus: 3

  spark-submit:
    image: apache/spark:3.5.0
    container_name: temp-spark-submit
    depends_on:
      - spark-master
    volumes:
      - ./:/opt/workspace
      - ./Pipeline/data/raw_data:/opt/dataset
    entrypoint: >
      /opt/spark/bin/spark-submit
      --master spark://spark-master:7077
      --total-executor-cores 6
      --executor-cores 2
      --executor-memory 2G
      /opt/workspace/your_app.py